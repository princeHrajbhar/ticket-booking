openapi: 3.0.3
info:
  title: Event Ticket Booking API
  description: REST API for managing users, events, bookings, and attendance validation.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
  - url: http://13.62.47.101:3001/api

tags:
  - name: Users
  - name: Events
  - name: Bookings

paths:

  /users:
    get:
      tags: [Users]
      summary: Get all users
      responses:
        200:
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags: [Users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUser'
      responses:
        201:
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          $ref: '#/components/responses/BadRequest'

  /users/{id}/bookings:
    get:
      tags: [Users]
      summary: Get bookings of a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
        404:
          $ref: '#/components/responses/NotFound'

  /events:
    get:
      tags: [Events]
      summary: Get all events
      responses:
        200:
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'

    post:
      tags: [Events]
      summary: Create event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvent'
      responses:
        201:
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        400:
          $ref: '#/components/responses/BadRequest'

  /events/{eventId}/attendance:
    post:
      tags: [Events]
      summary: Validate attendance using booking ID
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookingId]
              properties:
                bookingId:
                  type: integer
      responses:
        200:
          description: Attendance validated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  entryTime:
                    type: string
                    format: date-time
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFound'

  /bookings:
    post:
      tags: [Bookings]
      summary: Create booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBooking'
      responses:
        201:
          description: Booking successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        400:
          description: Booking failed (validation or capacity issue)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:

  schemas:

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string

    CreateUser:
      type: object
      required: [email]
      properties:
        name:
          type: string
        email:
          type: string

    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        total_capacity:
          type: integer
        remaining_tickets:
          type: integer

    CreateEvent:
      type: object
      required:
        - title
        - date
        - total_capacity
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        total_capacity:
          type: integer
        remaining_tickets:
          type: integer

    Booking:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        eventId:
          type: integer
        quantity:
          type: integer
        bookingDate:
          type: string
          format: date-time

    CreateBooking:
      type: object
      required:
        - userId
        - eventId
      properties:
        userId:
          type: integer
        eventId:
          type: integer
        quantity:
          type: integer
          default: 1

    Error:
      type: object
      properties:
        message:
          type: string
        status:
          type: integer

  responses:

    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'